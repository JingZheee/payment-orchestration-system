spring:
  application:
    name: payment-orchestration-system
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /

# Routing engine weights (must sum to 1.0)
routing:
  scorer:
    success-rate-weight: 0.50
    fee-weight: 0.30
    latency-weight: 0.20
  metrics:
    window-minutes: 60
    refresh-interval-minutes: 15

# RabbitMQ exchange / queue names
rabbitmq:
  exchanges:
    webhook: webhook.exchange
    retry: retry.exchange
  queues:
    webhook: webhook.queue
    webhook-dlq: webhook.dlq
    retry-30s: retry.q.30s
    retry-60s: retry.q.60s
    retry-120s: retry.q.120s
    payment-dlq: payment.dlq

# JWT config (secrets in application-dev.yml)
jwt:
  access-token-expiry-ms: 900000       # 15 minutes
  refresh-token-expiry-ms: 604800000   # 7 days

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
