<div class="result-container">
  <mat-card class="result-card">
    <mat-card-content>
      <div class="result-icon" [class.success]="isSuccess" [class.failed]="!isSuccess">
        <mat-icon>{{ isSuccess ? 'check_circle' : 'cancel' }}</mat-icon>
      </div>
      <h2>{{ isSuccess ? 'Payment Successful' : 'Payment Failed' }}</h2>
      <p class="sub">{{ isSuccess ? 'Your payment has been processed.' : 'The payment could not be completed.' }}</p>

      <div *ngIf="transactionId" class="txn-id">
        <span class="label">Transaction ID</span>
        <code>{{ transactionId }}</code>
      </div>

      <div class="actions">
        <button mat-stroked-button (click)="backToDemo()">
          <mat-icon>arrow_back</mat-icon> Back to Demo
        </button>
        <button mat-raised-button color="primary" (click)="viewTransaction()" *ngIf="transactionId">
          <mat-icon>timeline</mat-icon> View Timeline
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
